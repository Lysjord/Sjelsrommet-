
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Great+Vibes&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: radial-gradient(circle at top center, #1a0033, #000);
      color: white;
      text-align: center;
    }

    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2rem;
      margin-top: 20px;
    }

    #form-container {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      margin: 2rem auto;
      border: 2px solid gold;
      border-radius: 12px;
      width: 300px;
      font-family: 'Great Vibes', cursive;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    #result-card {
      display: none;
      margin: 40px auto;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      background: linear-gradient(145deg, #2e004f, #1a0033);
      border: 6px solid gold;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(255,255,255,0.6), 0 0 40px #ffcc00 inset;
      color: #fff;
      font-family: 'Georgia', serif;
    }

    #result-card h2 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.6em;
      color: #ffd700;
      margin-bottom: 10px;
    }

    #symbol {
      font-size: 2.5rem;
      color: #ffcc66;
      margin: 10px 0;
    }

    #numerology-message {
      font-size: 1em;
      line-height: 1.4em;
      color: #eee;
      margin-top: 15px;
    }

    #downloadBtn {
      margin-top: 20px;
      padding: 10px 20px;
      background: gold;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Soul Mirror</h1>
  <div id="form-container">
    <label>Feeling in Stillness:</label>
    <input type="text" id="feeling" />
    <label>Name:</label>
    <input type="text" id="name" />
    <label>Birth Date:</label>
    <input type="date" id="birthdate" />
    <label>Choose Period:</label>
    <select id="period">
      <option value="day">Day</option>
      <option value="week">Week</option>
      <option value="month">Month</option>
      <option value="year">Year</option>
    </select>
    <button onclick="revealSoulMirror()">Reveal My Soul Mirror</button>
  </div>

  <div id="result-card">
    <h2 id="star-message"></h2>
    <p id="translation"></p>
    <div id="symbol"></div>
    <p id="numerology-message"></p>
    <button id="downloadBtn" onclick="downloadCard()">Download as PNG</button>
  </div>

  <script>
    async function revealSoulMirror() {
      const name = document.getElementById('name').value;
      const feeling = document.getElementById('feeling').value;
      const birthdate = document.getElementById('birthdate').value;
      const period = document.getElementById('period').value;

      const response = await fetch('/api/generateMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, feeling, birthdate, period })
      });
      const data = await response.json();

      document.getElementById('star-message').innerText = data.starMessage;
      document.getElementById('translation').innerText = data.translation;
      document.getElementById('symbol').innerText = data.symbol;
      document.getElementById('numerology-message').innerText = data.numerology;
      document.getElementById('result-card').style.display = 'block';
      document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
    }

    function downloadCard() {
      html2canvas(document.querySelector("#result-card")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'soul_mirror.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
