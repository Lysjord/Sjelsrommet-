<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Soul Mirror V3 – Complete</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      text-align: center;
    }
    input, textarea, select {
      width: 90%%;
      max-width: 300px;
      margin: 0.5rem auto;
      padding: 0.6rem;
      font-size: 1rem;
      border-radius: 10px;
      border: none;
      display: block;
    }
    .card {
      background: white;
      color: black;
      padding: 1.5rem;
      border-radius: 20px;
      max-width: 400px;
      margin: 2rem auto;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .aura {
      width: 100px;
      height: 100px;
      margin: 0 auto 1rem;
      border-radius: 50%%;
      background: radial-gradient(circle, #ce93d8, #6a1b9a);
    }
    .symbol {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border-radius: 10px;
      border: none;
      margin-top: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Soul Mirror V3</h1>
  <textarea id="feeling" placeholder="What do you feel in silence?"></textarea>
  <input type="text" id="name" placeholder="Your full name" />
  <input type="date" id="dob" />
  <select id="scope">
    <option value="day">Today</option>
    <option value="week">This Week</option>
    <option value="month">This Month</option>
    <option value="year">This Year</option>
  </select>
  <button onclick="generate()">Reveal My Soul Mirror</button>
  <div id="result"></div>

  <script>
    function getChakraColor(text) {
      const t = text.toLowerCase();
      if (t.includes("safe") || t.includes("ground")) return "#ff7043";  // Root
      if (t.includes("create") || t.includes("flow")) return "#f06292";  // Sacral
      if (t.includes("power") || t.includes("strength")) return "#fff176"; // Solar
      if (t.includes("love") || t.includes("heart")) return "#aed581"; // Heart
      if (t.includes("truth") || t.includes("speak")) return "#4fc3f7"; // Throat
      if (t.includes("see") || t.includes("vision")) return "#9575cd"; // Third eye
      if (t.includes("light") || t.includes("spirit")) return "#ce93d8"; // Crown
      return "#90caf9"; // Default
    }

    function calculateLifePath(dob) {
      const digits = dob.replace(/[^0-9]/g, '').split('').map(Number);
      let sum = digits.reduce((a, b) => a + b, 0);
      while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
        sum = sum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
      }
      return sum;
    }

    function generate() {
      const name = document.getElementById('name').value.trim();
      const dob = document.getElementById('dob').value;
      const feeling = document.getElementById('feeling').value.trim();
      const scope = document.getElementById('scope').value;

      if (!name || !dob || !feeling) {
        alert('Please fill out all fields.');
        return;
      }

      const pathNumber = calculateLifePath(dob);
      const color = getChakraColor(feeling);

      const result = document.createElement('div');
      result.className = 'card';
      result.id = 'card-result';
      result.innerHTML = `
        <div class='aura' style="background:${color}"></div>
        <div class='symbol'>✶</div>
        <p><strong>∴ Sha’vala oren’kai ∴</strong></p>
        <p><em>You are awakening light through truth.</em></p>
        <p>${name}, your ${scope} number is ${pathNumber}, a path of remembrance and illumination.</p>
        <button onclick="download()">Download My Soul Mirror</button>
      `;
      document.getElementById("result").innerHTML = '';
      document.getElementById("result").appendChild(result);
    }

    function download() {
      html2canvas(document.getElementById("card-result")).then(canvas => {
        const link = document.createElement("a");
        link.download = "soul-mirror.png";
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
