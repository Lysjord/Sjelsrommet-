
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soul Mirror – AI Connected</title>
  <style>
    body {
      background: #000;
      color: white;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2em;
    }
    input, select, button {
      margin: 10px;
      padding: 10px;
      font-size: 1em;
    }
    #soul-card {
      display: none;
      margin: 2em auto;
      padding: 1em;
      border: 6px solid gold;
      border-radius: 20px;
      max-width: 400px;
      background: #111 url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?auto=format&fit=crop&w=420&q=80') no-repeat center center;
      background-size: cover;
      box-shadow: 0 0 20px gold;
    }
  </style>
</head>
<body>
  <h1>Soul Mirror</h1>
  <input type="text" id="name" placeholder="Name" />
  <input type="text" id="feeling" placeholder="Feeling in stillness" />
  <input type="date" id="birthdate" />
  <button onclick="fetchAISoulReading()">Reveal My Soul Mirror</button>

  <div id="soul-card">
    <h2 id="card-name"></h2>
    <p id="card-feeling"></p>
    <p id="card-star"></p>
    <p id="card-translation" style="font-style: italic;"></p>
    <p id="card-numerology" style="margin-top: 1em;"></p>
  </div>

  <script>
    async function fetchAISoulReading() {
      const name = document.getElementById("name").value;
      const feeling = document.getElementById("feeling").value;
      const birthdate = document.getElementById("birthdate").value;

      if (!name || !feeling || !birthdate) {
        alert("Please fill out all fields.");
        return;
      }

      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_API_KEY" // <-- SETT INN API-NØKKEL HER
        },
        body: JSON.stringify({
          model: "gpt-3.5-turbo",
          messages: [
            {
              role: "system",
              content: "You are a spiritual AI guide. Respond in poetic, mystical tone. Return a star message, a translation in English, and a numerology-based insight."
            },
            {
              role: "user",
              content: `Name: ${name}, Feeling: ${feeling}, Birthdate: ${birthdate}. Give me a soul mirror message.`
            }
          ]
        })
      });

      const data = await response.json();
      const reply = data.choices[0].message.content;

      document.getElementById("card-name").innerText = name;
      document.getElementById("card-feeling").innerText = "You feel: " + feeling;
      document.getElementById("card-star").innerText = reply.split("Translation:")[0].trim();
      document.getElementById("card-translation").innerText = reply.split("Translation:")[1]?.split("Numerology:")[0]?.trim() || "";
      document.getElementById("card-numerology").innerText = reply.split("Numerology:")[1]?.trim() || "";
      document.getElementById("soul-card").style.display = "block";
    }
  </script>
</body>
</html>
